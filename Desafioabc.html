var A = 10
var B = 20
var c = null


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>

    <script>
        var A = 10
        var B = 20
        var c = null // variavel auxiliar utilizada na logica de troca de valores

        document.write('Valor de A: ' + A + '<br>'); //escreve o valor de A na página
        document.write('Valor de B: ' + B + '<br>'); //escre o valor de B na página
        document.write('Valor de C: ' + c + '<br>'); //escreve o valor de C na página

        document.write('<hr>'); //escreve uma linha horizontal na página


        //lógica de inversao dos valores das variaveis A e B utilizando a variavel auxiliar C

        //
        document.write('Valor de A: ' + A + '<br>'); 
        document.write('Valor de B: ' + B + '<br>'); 
        document.write('Valor de C: ' + c + '<br>');

    </script>

</head>

<body>



</body>

</html>
